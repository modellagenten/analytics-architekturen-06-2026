version: 2

models:
  - name: stg_vertraege
    description: "Bereinigte Vertrags-Sätze aus dem Mainframe-Export"
    columns:
      - name: vertrag_id
        description: "Interne Vertrags-ID (Primärschlüssel)"
        data_tests: 
          - not_null
          - unique
      - name: status_code
        description: "A=aktiv, I=inaktiv, S=storniert, X=Sonder"
        data_tests:
          - accepted_values:
              arguments:
                values: ['A', 'I', 'S', 'X']

  - name: stg_schaden_events
    description: "Inkrementelle Schaden-Events aus der FastAPI"
    columns:
      - name: schaden_event_id
        tests: 
          - unique
          - not_null
      - name: vertrag_id


  - name: stg_kunden
    description: "Kundenstamm (Privat + Firmen)"
    columns:
      - name: kunde_id
        data_tests:
          - unique
          - not_null
      - name: kundentyp
        data_tests:
          - accepted_values:
              values: ['F', 'P']
      - name: anzeigename
        data_tests:
          - not_null
          
  - name: stg_tarife
    description: "Monatliche Tarif-Stammdaten"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [tarif_code, monat_nr]
    columns:
      - name: tarif_code
        tests:
        - not_null
      - name: monat_nr
        tests:
        - not_null
      - name: quartal
        tests: 
          - not_null

        

